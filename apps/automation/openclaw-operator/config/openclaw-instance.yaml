apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: kira
  namespace: openclaw
spec:
  envFrom:
    - secretRef:
        name: infisical-openclaw-secret
  config:
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-20250514"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: prometheus
  networking:
    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - host: openclaw.hobroker.me
