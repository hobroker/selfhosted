defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: linuxserver/radarr
          tag: 6.1.2-develop
          pullPolicy: IfNotPresent
        env:
          PGID: "1000"
          PUID: "1000"

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 7878

serviceMonitor:
  metrics:
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-metrics'
    enabled: true
    endpoints:
      - port: http

persistence:
  config:
    existingClaim: radarr-config-pvc
    globalMounts:
      - path: /config
  nebula:
    existingClaim: radarr-nebula-pvc
    globalMounts:
      - path: /mnt/nebula

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: radarr.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
