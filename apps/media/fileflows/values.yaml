defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: revenz/fileflows
          tag: 26.04
          pullPolicy: IfNotPresent
        env:
          TempPathHost: "/transcode_cache"
          TZ: "Europe/Chisinau"
          PUID: "1000"
          PGID: "1000"
        resources:
          limits:
            cpu: 9600m
            memory: 20Gi

service:
  main:
    controller: main
    type: ClusterIP

persistence:
  config:
    existingClaim: fileflows-config-pvc
    globalMounts:
      - path: /app/common
        subPath: common
      - path: /app/Data
        subPath: Data
      - path: /app/Logs
        subPath: Logs
  tmp:
    type: emptyDir
    globalMounts:
      - path: /temp
  nebula:
    existingClaim: fileflows-nebula-pvc
    globalMounts:
      - path: /media/nebula

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: fileflows.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
