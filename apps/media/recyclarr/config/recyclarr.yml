# yaml-language-server: $schema=https://schemas.recyclarr.dev/latest/config-schema.json
#
# Setup: 1Gb unlimited, Samsung TV (HDR10), MacBook speakers, English+Russian
# Strategy:
#   Sonarr: WEB-1080p (BluRay is ceiling for <5% of shows, don't wait for it)
#   Radarr: Accept WEB immediately, upgrade to BluRay-1080p when available

sonarr:
  sonarr:
    base_url: http://sonarr:8989
    api_key: $SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
        min_format_score: 0
        qualities:
          - name: WEB 1080p
            enabled: true
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
            enabled: true
          - name: WEBDL-720p
            enabled: false
          - name: WEBRip-720p
            enabled: false
          - name: HDTV-720p
            enabled: false

    custom_formats:
      # ── Streaming Services ─────────────────────────────────────────────────
      # Higher scores = more trusted/curated source
      - trash_ids:
          - d660701077794679fd59e8bdf4ce3a29 # AMZN
          - f67c9ca88f463a48346062e8ad07713f # ATVP
          - 36b72f59f4ea20aad9316f475f2d9fbb # DCU
          - 89358767a60cc28783cdc3d0be9388a4 # DSNP
          - a880d6abc21e7c16884f3ae393f84179 # HMAX
          - 7a235133c87f7da4c8cccceca7e3c7a6 # HBO
          - f6cce30f1733d5c8194222a7507909bb # HULU
          - 81d1fbf600e2540cee87f3a23f9d3c1c # MAX
          - d34870697c9db575f17700212167be23 # NF
          - 1656adc6d7bb2c8cca6acfb6592db421 # PCOK (Peacock)
          - c67a75ae4a1715f2bb4d492755ba4195 # PMTP (Paramount+)
        assign_scores_to:
          - name: WEB-1080p
            score: 100

      # ── HDR ────────────────────────────────────────────────────────────────
      # Samsung TV supports HDR natively - small positive boost
      # Note: Sonarr has only a generic "HDR" CF (no separate HDR10/HLG)
      - trash_ids:
          - 505d871304820ba7106b693be6fe4a9e # HDR
        assign_scores_to:
          - name: WEB-1080p
            score: 15

      - trash_ids:
          - 0c4b99df9206d2cfac3c05ab897dd62a # HDR10+ Boost
        assign_scores_to:
          - name: WEB-1080p
            score: 10

      # ── Audio ──────────────────────────────────────────────────────────────
      # MacBook + Samsung TV speakers: will downmix anyway, but high-quality
      # audio indicates a premium release worth a small boost
      - trash_ids:
          - 63487786a8b01b7f20dd2bc90dd4a477 # DD+ (EAC3) - common on streaming
        assign_scores_to:
          - name: WEB-1080p
            score: 10

      - trash_ids:
          - 1808e4b9cee74e064dfae3f1db99dbfe # TrueHD
          - c429417a57ea8c41d57e6990a8b0033f # DTS-HD MA
          - 851bd64e04c9374c51102be3dd9ae4cc # FLAC
          - cfa5fbd8f02a86fc55d8d223d06a5e1f # DTS-HD HRA
        assign_scores_to:
          - name: WEB-1080p
            score: 5

      # ── Russian / MULTi ────────────────────────────────────────────────────
      # Prefer releases that contain multiple audio tracks (often includes Russian)
      # Pair this with Sonarr's language profile set to "Any" + preferred Russian
      - trash_ids:
          - 7ba05c6e0e14e793538174c679126996 # MULTi
        assign_scores_to:
          - name: WEB-1080p
            score: 25

      # ── Unwanted ───────────────────────────────────────────────────────────
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK (full disc rip, unwieldy)
        assign_scores_to:
          - name: WEB-1080p
            score: -10000

radarr:
  radarr:
    base_url: http://radarr:7878
    api_key: $RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - name: UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
          until_score: 10000
        min_format_score: 0
        qualities:
          - name: Remux-2160p
            enabled: false
          - name: Bluray-2160p
            enabled: true
          - name: WEB 2160p
            enabled: true
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p

      - name: HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        qualities:
          - name: Bluray-1080p
            enabled: true
          - name: WEB 1080p
            enabled: true
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Bluray-720p
            enabled: false
          - name: WEBDL-720p
            enabled: false
          - name: WEBRip-720p
            enabled: false

    custom_formats:
      # ── Streaming Services ─────────────────────────────────────────────────
      # For WEB releases: prefer known-quality streaming sources
      - trash_ids:
          - b3b3a6ac74ecbd56bcdbefa4799fb9df # AMZN
          - 40e9380490e748672c2522eaaeb692f7 # ATVP
          - 84272245b2988854bfb76a16e60baea5 # DSNP
          - 509e5f41146e278f9eab1ddaceb34515 # HBO
          - 5763d1b0ce84aff3b21038eea8e9b8ad # HMAX
          - 526d445d4c16214309f0fd2b3be18a89 # Hulu
          - 6a061313d22e51e0f25b7cd4dc065233 # MAX
          - 170b1d363bd8516fbf3a3eb05d4faff6 # NF
          - c9fd353f8f5f1baf56dc601c4cb29920 # PCOK
          - e36a0ba1bc902b26ee40818a1d59b8bd # PMTP
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 70
          - name: HD Bluray + WEB
            score: 70

      # ── HDR ────────────────────────────────────────────────────────────────
      # Samsung TV supports HDR - higher score than Sonarr since movies benefit more
      - trash_ids:
          - 493b6d1dbec3c3364c59d7607f7e3405 # HDR
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 30
          - name: HD Bluray + WEB
            score: 20

      - trash_ids:
          - caa37d0df9c348912df1fb1d88f9273a # HDR10+ Boost
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 20
          - name: HD Bluray + WEB
            score: 15

      # ── HDR (UHD-specific) ─────────────────────────────────────────────────
      # Samsung TV supports HDR10 natively but NOT Dolby Vision.
      # DV HDR10 has an HDR10 fallback layer → safe to boost.
      # Pure DV has no HDR10 fallback → penalise to avoid washed-out picture.
      - trash_ids:
          - e23edd2482476e595fb990b12e7c609c # DV HDR10
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 25

      - trash_ids:
          - 58d6a88f13e2db7f5059c41047876f00 # DV (no HDR10 fallback)
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: -10000

      # ── Audio ──────────────────────────────────────────────────────────────
      - trash_ids:
          - 185f1dd7264c4562b9022d963ac37424 # DD+ (EAC3)
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 8
          - name: HD Bluray + WEB
            score: 8

      - trash_ids:
          - 3cafb66171b47f226146a0770576870f # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd # DTS-HD MA
          - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 10
          - name: HD Bluray + WEB
            score: 10

      # ── Russian / MULTi ────────────────────────────────────────────────────
      - trash_ids:
          - 4b900e171accbfb172729b63323ea8ca # MULTi
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: 25
          - name: HD Bluray + WEB
            score: 25

      # ── Unwanted ───────────────────────────────────────────────────────────
      - trash_ids:
          - b8cd450cbfa689c0259a01d9e29ba3d6 # 3D
          - ed38b889b31be83fda192888e2286d83 # BR-DISK (full disc rip)
        assign_scores_to:
          - name: UHD Bluray + WEB
            score: -10000
          - name: HD Bluray + WEB
            score: -10000
