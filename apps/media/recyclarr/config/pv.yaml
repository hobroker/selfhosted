apiVersion: v1
kind: PersistentVolume
metadata:
  name: recyclarr-config-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/local/recyclarr
  claimRef:
    name: recyclarr-config-pvc
    namespace: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: recyclarr-config-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: recyclarr-config-pv
  resources:
    requests:
      storage: 1Gi
