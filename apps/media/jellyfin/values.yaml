defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: linuxserver/jellyfin
          tag: 10.11.7
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8096

persistence:
  config:
    existingClaim: jellyfin-config-pvc
    globalMounts:
      - path: /config
  nebula:
    existingClaim: jellyfin-nebula-pvc
    globalMounts:
      - path: /mnt/nebula

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    className: "traefik"
    hosts:
      - host: jellyfin.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
