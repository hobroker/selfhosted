defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: kopia/kopia
          tag: 20260224.0.42919
          pullPolicy: IfNotPresent
        args:
          - server
          - start
          - --insecure
          - --address=0.0.0.0:51515
          - --server-username=admin
          - --server-password=$(KOPIA_UI_PASSWORD)
        envFrom:
          - secretRef:
              name: infisical-kopia-secret

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 51515

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: kopia.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main

persistence:
  config:
    existingClaim: kopia-config-pvc
    globalMounts:
      - path: /app/config
  cache:
    existingClaim: kopia-cache-pvc
    globalMounts:
      - path: /app/cache
  varlocal:
    existingClaim: kopia-varlocal-pvc
    globalMounts:
      - path: /var/local
