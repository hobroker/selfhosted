defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: linuxserver/code-server
          tag: 4.109.2
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8443

persistence:
  config:
    existingClaim: code-server-config-pvc
    globalMounts:
      - path: /config
  varlocal:
    existingClaim: code-server-varlocal-pvc
    globalMounts:
      - path: /var/local

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: code.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
