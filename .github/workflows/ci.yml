name: CI

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Prettier
        run: npm run format:check
      - name: Run ESLint
        run: npm run lint
      - name: Run typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: yokawasa/action-setup-kube-tools@v0.13.1
        with:
          kubeconform: "0.7.0"
      - name: Validate manifests
        run: |
          grep -rlE --include='*.yaml' 'kind:' charts | xargs kubeconform \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary

  helmfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Helm
        uses: azure/setup-helm@v4.3.1
      - name: Install Helmfile
        uses: helmfile/helmfile-action@v2.3.1
        with:
          helmfile-args: version
      - name: Helmfile lint
        run: |
          set -e
          helmfile_files=$(find charts -maxdepth 3 -type f -name 'helmfile.yaml')
          for helmfile_file in $helmfile_files; do
            helmfile --file $helmfile_file lint
          done
