---
name: App Request
description: Suggest adding a new app to the collection

body:
  - type: input
    id: app_name
    attributes:
      label: App name
      placeholder: e.g. Plex
    validations:
      required: true

  - type: input
    id: app_url
    attributes:
      label: App URL
      description: Link to the app's website or repository.
      placeholder: https://github.com/...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should it be added?
      description: Briefly describe what the app does and why it would be a good fit.
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/hobroker/selfhosted/blob/master/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
