global:
  domain: argo.hobroker.me

configs:
  params:
    server.insecure: true # terminate TLS at Traefik, serve HTTP internally

server:
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/allow-shared-ip: shared

  metrics:
    enabled: true

  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hostname: argo.hobroker.me
