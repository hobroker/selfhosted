defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.1.0
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 5055

persistence:
  config:
    existingClaim: seerr-config-pvc
    globalMounts:
      - path: /config

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: seerr.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
