config:
  persistence:
    existingClaim: seerr-config-pvc

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: seerr.hobroker.me
      paths:
        - path: /
          pathType: Prefix
