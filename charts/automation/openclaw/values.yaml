controllers:
  main:
    pod:
      annotations:
        secret.reloader.stakater.com/reload: "infisical-openclaw-secret"
    containers:
      main:
        envFrom:
          - secretRef:
              name: infisical-openclaw-secret
persistence:
  data:
    existingClaim: openclaw-data-pvc
    globalMounts:
      - path: /home/node/.openclaw
