defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: linuxserver/syncthing
          tag: 2.0.14
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8384
  misc:
    type: NodePort
    controller: main
    primary: false
    ports:
      tcp:
        protocol: TCP
        port: 22000
        nodePort: 22000
      udp:
        protocol: UDP
        port: 22000
        nodePort: 22000
      discovery:
        protocol: UDP
        port: 21027
        nodePort: 21027

persistence:
  config:
    existingClaim: syncthing-config-pvc
    globalMounts:
      - path: /config
  storage:
    existingClaim: syncthing-storage-pvc
    globalMounts:
      - path: /mnt/nebula/syncthing

ingress:
  main:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: syncthing.hobroker.me
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
