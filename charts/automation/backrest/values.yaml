defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: garethgeorge/backrest
          tag: v1.12.0
          pullPolicy: IfNotPresent
        env:
          BACKREST_CONFIG: /data/config.json
          BACKREST_DATA: /data
          GOOGLE_APPLICATION_CREDENTIALS: /data/credentials/gcs-key.json
          GOOGLE_PROJECT_ID: "crashplan-334916"

service:
  main:
    controller: main
    type: LoadBalancer
    ports:
      http:
        port: 9898

persistence:
  data:
    enabled: true
    type: hostPath
    hostPath: /appdata/k3s/backrest/data
    globalMounts:
      - path: /data
  appdata:
    enabled: true
    type: hostPath
    hostPath: /appdata/k3s
    globalMounts:
      - path: /appdata/k3s
