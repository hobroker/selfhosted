defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  main:
    containers:
      main:
        image:
          repository: caronc/apprise
          tag: 1.9.5
          pullPolicy: IfNotPresent

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8000

persistence:
  config:
    existingClaim: apprise-config-pvc
    globalMounts:
      - path: /config
