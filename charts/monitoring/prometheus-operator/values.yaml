prometheus:
  prometheusSpec:
    enableAdminAPI: true
    retention: 60d
    scrapeInterval: 1m
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    securityContext:
      fsGroup: 0
      runAsNonRoot: false
      runAsUser: 0
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ""
          resources:
            requests:
              storage: 20Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - prometheus.hobroker.me

grafana:
  grafana.ini:
    users:
      auto_assign_org: true
      auto_assign_org_role: Viewer
    auth.proxy:
      enabled: true
      header_name: cf-access-authenticated-user-email
      header_property: email
      auto_sign_up: true
      enable_login_token: false
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - grafana.hobroker.me
  persistence:
    enabled: true
    existingClaim: prometheus-operator-grafana

alertmanager:
  enabled: false

defaultRules:
  create: false # no alertmanager to route these to

kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false # Talos doesn't run kube-proxy

kubeEtcd:
  enabled: false # requires client cert setup on Talos
